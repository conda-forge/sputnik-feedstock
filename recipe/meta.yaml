{% set name = "sputnik" %}
{% set version = "0.9.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sputnik-{{ version }}.tar.gz
  sha256: 2a2a506a2d68383f73dc7a546957714d316e23ce558e8d9115674f899d1f1273

build:
  number: 1004
  noarch: python
  entry_points:
    - sputnik = sputnik.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - semver

test:
  imports:
    - sputnik
    - sputnik.tests
  commands:
    - pip check
    - sputnik --help
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/explosion/sputnik
  license: MIT
  license_file: LICENSE
  summary: 'Sputnik: a data package manager library'
  description: |
    Sputnik is a library for managing data packages for another library, e.g.,
    models for a machine learning library.

extra:
  recipe-maintainers:
    - rmax
